version: "3.8"

services:
  database:
    image: mysql:8.0
    container_name: notes_db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    ports:
      - "3306:3306"

    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - notes_network

  backend:
    build: ./backend
    container_name: notes_backend
    restart: always

    ports:
      - "5000:5000"

    environment:
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_NAME: ${DB_NAME}
      PORT: 5000

    depends_on:
      - database

    networks:
      - notes_network

  frontend:
    build: ./frontend
    container_name: notes_frontend
    restart: always

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - notes_network

volumes:
  db_data:

networks:
  notes_network:
    driver: bridge
