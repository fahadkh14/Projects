<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dockerized Notes App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>My Notes</h1>
        
        <form id="note-form">
            <input type="text" id="title" placeholder="Note Title" required>
            <textarea id="content" placeholder="Take a note..." rows="4" required></textarea>
            <button type="submit">Add Note</button>
        </form>

        <div id="notes-container" class="notes-grid">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
